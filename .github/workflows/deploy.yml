name: Deploy itinerary to GitHub Pages

# Runs every time you push a change (e.g. an edit to itinerary.md or template.html),
# and can also be run by hand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build the webpage from itinerary.md
        run: |
          python3 build.py
          mkdir -p public
          cp Coronado_July4_2026.html public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
