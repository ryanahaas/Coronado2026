<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --sand-bg:#FBF6EC; --card:#FFFFFF; --ink:#2B2A28; --ink-soft:#6F6A60;
  --line:#EAE1CF; --red:#C2554E; --red-deep:#8E342E; --red-bg:#F6E2DC; --red-line:#E7C3BB;
  --blue:#356093; --blue-deep:#1E4A72; --blue-bg:#E6EFF7; --blue-line:#C3D7E8;
  --pill-bg:#EAF1F8; --pill-line:#C9DCEC; --pill-ink:#2E5680;
  --gold:#E9A53E; --sky:#DCEBF5;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--sand-bg);color:var(--ink);line-height:1.5;
  font-family:'Klee One',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
a{color:var(--blue)}
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--sky) 0%,#EFE7D6 70%,var(--sand-bg) 100%);
  padding:30px 16px 54px;text-align:center;border-bottom:1px solid var(--line)}
.hero-in{position:relative;z-index:2;max-width:900px;margin:0 auto}
.kicker{font-family:'Caveat',cursive;font-size:21px;color:var(--red-deep);font-weight:600;margin-bottom:0}
.hero h1{margin:0;font-family:'Caveat',cursive;font-size:66px;color:var(--blue-deep);font-weight:700;line-height:.9}
.hero .sub{font-family:'Caveat',cursive;font-size:30px;color:var(--red);font-weight:700;margin-top:0}
.hero .dates{font-size:16px;color:var(--ink-soft);margin-top:8px}
.hero .tz{font-size:13px;color:var(--ink-soft);margin-top:2px}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:22px;height:12px;border-radius:4px;border:1px solid var(--pill-line);background:var(--pill-bg);display:inline-block}
.sw.bar{width:30px}
.sun{position:absolute;top:18px;right:26px;z-index:1;opacity:.9}
.waves{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:34px;display:block;z-index:1}
nav.nav{position:sticky;top:0;z-index:20;background:rgba(251,246,236,.94);backdrop-filter:blur(7px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;font-size:14px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);
  color:var(--ink-soft);text-decoration:none;white-space:nowrap;background:var(--card)}
.chip.active{background:var(--red-bg);color:var(--red-deep);border-color:var(--red-line);font-weight:600}
.wrap{max-width:900px;margin:0 auto;padding:6px 16px 96px}
section.day{scroll-margin-top:62px;padding:24px 0 8px;border-top:1px solid var(--line)}
section.day:first-of-type{border-top:none}
.dayhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 14px}
.dayhead h2{font-family:'Caveat',cursive;font-size:33px;margin:0;font-weight:700;color:var(--ink);line-height:1.05;
  background:linear-gradient(transparent 62%, rgba(233,165,62,.45) 62%);padding:0 5px}
.dayhead .hl{font-size:13px;color:var(--red-deep);font-weight:600}
.dayhead .today{font-size:11px;background:var(--red);color:#fff;border-radius:999px;padding:2px 9px;font-weight:600}
.daygrid{display:grid;grid-template-columns:1fr 300px;column-gap:22px;row-gap:9px;position:relative;align-items:start}
.daygrid::before{content:"";position:absolute;top:2px;bottom:2px;right:311px;width:0;border-left:2px dashed #D9CDB3}
.cell-l{display:flex;flex-direction:column;gap:9px}
.cell-r{display:flex;flex-direction:column;gap:13px;align-items:flex-start}
.item{display:grid;grid-template-columns:88px 1fr;gap:12px}
.itime{font-size:14px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
.title{font-size:16px;color:var(--ink)}
.note{font-size:14px;color:var(--ink-soft)}
.msq{position:relative;display:inline-block;padding:11px 28px}
.msq>svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.msqt{position:relative;font-size:14px;color:var(--blue-deep);white-space:nowrap;line-height:1.2}
.mpill{display:inline-flex;background:transparent;border:1.5px solid #9FBDDA;color:var(--pill-ink);border-radius:16px 13px 17px 14px;padding:5px 10px;font-size:12px;line-height:1.3}
.mt{font-weight:400;margin-right:7px;white-space:nowrap;color:var(--ink-soft)}
.v{color:#7C9BBC;padding:0 3px;font-size:12px}
.match-strip{display:none}
#soccer{display:none}
#bigtext{display:none}
.toggles{display:flex;justify-content:center;align-items:center;gap:28px;flex-wrap:wrap;margin:8px 0 16px}
.soccer-toggle,.big-toggle{display:flex;align-items:center;gap:4px;width:fit-content;margin:0;cursor:pointer}
.il{display:inline-flex;align-items:center;gap:7px;font-size:19px;color:#2B2A28;font-family:Georgia,"Times New Roman",serif}
.strack{position:relative;width:58px;height:30px;border-radius:999px;background:#E2DBC9;transition:background .2s;flex:0 0 auto}
.sknob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid #DCD2BB;display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .2s}
#soccer:checked ~ main .soccer-toggle .strack{background:#9AD0AB}
#soccer:checked ~ main .soccer-toggle .sknob{transform:translateX(28px)}
#bigtext:checked ~ main .big-toggle .strack{background:#8FBEE6}
#bigtext:checked ~ main .big-toggle .sknob{transform:translateX(28px)}
.wc-link{display:none;margin:0 auto 14px;width:fit-content;text-decoration:none;background:var(--pill-bg);border:1px solid var(--pill-line);color:var(--pill-ink);border-radius:16px 13px 17px 14px;padding:7px 16px;font-size:14px;font-weight:600}
#soccer:checked ~ main .wc-link{display:block}
#bigtext:checked ~ main .item,#bigtext:checked ~ main .featrow{grid-template-columns:140px 1fr}
#bigtext:checked ~ main .dayhead h2{font-size:48px}
#bigtext:checked ~ main .title{font-size:25px}
#bigtext:checked ~ main .itime{font-size:20px}
#bigtext:checked ~ main .note{font-size:19px}
#bigtext:checked ~ main .msqt{font-size:18px}
#bigtext:checked ~ main .mpill{font-size:16px}
#bigtext:checked ~ main .btext{font-size:23px}
#bigtext:checked ~ main .ftime{font-size:20px}
#bigtext:checked ~ main .empty{font-size:20px}
#bigtext:checked ~ .allweek .aw-items{font-size:20px}
#bigtext:checked ~ nav .chip{font-size:18px}
.featrow{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:start}
.ftime{font-size:14px;font-weight:600;color:var(--blue-deep);white-space:nowrap}
.barbox{position:relative;background:transparent;border:none;padding:9px 16px;margin-left:-16px}
.bsq{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.barbox .btext,.barbox .bnote{position:relative}
.btext{font-size:15px;color:var(--blue-deep);line-height:1.35}
.btext .loc{color:var(--blue)}
.bnote{font-size:12px;color:var(--ink-soft);margin-top:3px}
.empty{font-size:15px;color:var(--ink-soft);font-style:italic}
.past{opacity:.42}
.chip.past{opacity:.5}
.allweek{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
  padding:9px 16px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.aw-label{font-family:'Caveat',cursive;font-size:18px;color:var(--red-deep);font-weight:700}
.aw-items{font-size:15px;color:var(--ink)}
@media (max-width:760px){
  .hero h1{font-size:52px}
  section.day{border-top:2px solid #D3C4A2;padding-bottom:22px}
  .daygrid{display:block}
  .daygrid::before{display:none}
  .daygrid>*{grid-row:auto!important;grid-column:auto!important;margin-bottom:9px}
  .cell-r{display:none}
  .barbox{background:none;border:none;padding:0;margin-left:0}
  .bsq{display:none}
  .match-strip{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:12px;padding-top:14px;border-top:2px dashed #D9CDB3}
  .match-strip .ball{font-size:16px;margin-right:1px}
  .toggles{margin:4px 0 14px}
  #soccer:checked ~ main .cell-r{display:flex}
  #soccer:checked ~ main .match-strip{display:none}
  .title{font-size:18px}
  .itime{font-size:15px}
  .btext{font-size:16px}
}
@keyframes ballfall{0%{transform:translateY(-12vh) rotate(0deg)}100%{transform:translateY(112vh) rotate(var(--spin,540deg))}}
.ballrain{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.ballrain span{position:absolute;top:0;will-change:transform}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<filter id="rgh0" x="-25%" y="-60%" width="150%" height="220%"><feTurbulence type="fractalNoise" baseFrequency="0.022 0.035" numOctaves="2" seed="4" result="w"/><feDisplacementMap in="SourceGraphic" in2="w" scale="5.5" xChannelSelector="R" yChannelSelector="G"/></filter>
<filter id="rgh1" x="-25%" y="-60%" width="150%" height="220%"><feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="9" result="w"/><feDisplacementMap in="SourceGraphic" in2="w" scale="5" xChannelSelector="R" yChannelSelector="G"/></filter>
<filter id="rgh2" x="-25%" y="-60%" width="150%" height="220%"><feTurbulence type="fractalNoise" baseFrequency="0.024 0.038" numOctaves="2" seed="14" result="w"/><feDisplacementMap in="SourceGraphic" in2="w" scale="6" xChannelSelector="R" yChannelSelector="G"/></filter>
</defs></svg>
<input type="checkbox" id="soccer">
<input type="checkbox" id="bigtext">
<header class="hero">
  <svg class="sun" width="74" height="74" viewBox="0 0 74 74" aria-hidden="true">
    <circle cx="37" cy="37" r="15" fill="#F1B44C"/>
    <g stroke="#E9A53E" stroke-width="3" stroke-linecap="round">
      <line x1="37" y1="6" x2="37" y2="16"/><line x1="37" y1="58" x2="37" y2="68"/>
      <line x1="6" y1="37" x2="16" y2="37"/><line x1="58" y1="37" x2="68" y2="37"/>
      <line x1="15" y1="15" x2="22" y2="22"/><line x1="52" y1="52" x2="59" y2="59"/>
      <line x1="59" y1="15" x2="52" y2="22"/><line x1="22" y1="52" x2="15" y2="59"/>
    </g>
  </svg>
  <div class="hero-in">
    <h1>__H1__</h1>
    <div class="sub">__SUB__</div>
    <div class="dates">__DATES__</div>
  </div>
  <svg class="waves" viewBox="0 0 1200 34" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,18 C150,34 300,2 450,16 C600,30 750,4 900,16 C1050,28 1150,12 1200,18 L1200,34 L0,34 Z" fill="#FBF6EC"/>
  </svg>
</header>

<nav class="nav"><div class="nav-inner" id="nav"></div></nav>
<main class="wrap" id="days"><div class="toggles"><label for="soccer" class="soccer-toggle"><span class="il">I<svg class="heart" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C2554E" stroke-width="2" stroke-linejoin="round" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span><span class="strack"><span class="sknob">⚽</span></span></label><label for="bigtext" class="big-toggle"><span class="il">I'm 🧓</span><span class="strack"><span class="sknob">🔍</span></span></label></div><a class="wc-link" href="https://harry-wagener.github.io/WC_tracker/" target="_blank" rel="noopener">🏆 World Cup Pool Standings ↗</a></main>
<div class="allweek"><span class="aw-label">Anytime all week</span><span class="aw-items">__ALLWEEK__</span></div>

<script>
const DATA=__DATA__;

function teams(m){
  const a=(m.A[0]?m.A[0]+" ":"")+m.A[1];
  const b=(m.B[0]?m.B[0]+" ":"")+m.B[1];
  return a+' <span class="v">v</span> '+b+(m.g?" ?":"");
}
function actInner(a){
  const note=a.n?(a.n.charAt(0)==='@'?(' <span class="note">'+a.n+'</span>'):(' <span class="note">— '+a.n+'</span>')):"";
  return '<div class="item"><div class="itime">'+a.t+'</div><div><span class="title">'+a.x+'</span>'+note+'</div></div>';
}
const SQ_PATHS=["M54 13 C108 4 172 7 202 20 C220 30 210 47 170 53 C112 63 46 60 21 46 C4 37 14 14 70 11","M50 12 C104 5 174 6 200 19 C220 29 208 48 168 54 C110 63 44 59 20 45 C3 36 16 13 66 12","M55 14 C106 4 170 7 201 20 C219 30 209 46 167 53 C111 62 47 60 22 47 C5 38 12 15 68 11"];
let mseq=0;
function sqWrap(inner,dm){
  const i=mseq++%3, rot=(i-1)*0.7, da=(dm!==undefined?' data-m="'+dm+'"':'');
  return '<span class="msq"'+da+' style="transform:rotate('+rot+'deg)"><svg viewBox="0 0 230 60" preserveAspectRatio="none" aria-hidden="true"><path d="'+SQ_PATHS[i]+'" fill="none" stroke="#34608f" stroke-width="4" stroke-linecap="round" opacity="0.82" vector-effect="non-scaling-stroke" filter="url(#rgh'+i+')"/></svg><span class="msqt">'+inner+'</span></span>';
}
function bubble(m){
  const body=m.ro?('Round of 16 · '+m.ro):teams(m);
  return sqWrap('<span class="mt">'+m.t+'</span>'+body);
}
function bubbleCompact(m){
  const mini=s=>s[0]||s[1];
  const tt=m.t.replace(':00','');
  const body=m.ro?('R16 · '+m.ro):(mini(m.A)+' <span class="v">v</span> '+mini(m.B)+(m.g?' ?':''));
  return '<span class="mpill" data-m="'+m.m+'"><span class="mt">'+tt+'</span>'+body+'</span>';
}
function featRow(m,gr){
  const note=(m.n||m.h)?('<div class="bnote">'+(m.n||"")+((m.n&&m.h)?" · ":"")+(m.h?('<a href="'+m.h+'" target="_blank" rel="noopener">register</a>'):"")+'</div>'):"";
  const sq='<svg class="bsq" viewBox="0 0 230 60" preserveAspectRatio="none" aria-hidden="true"><path d="M9 9 L221 7 L223 53 L7 55 Z" fill="none" stroke="#34608f" stroke-width="4" stroke-linejoin="round" opacity="0.82" vector-effect="non-scaling-stroke" filter="url(#rgh1)"/></svg>';
  return '<div class="featrow" data-m="'+m.m+'" style="grid-row:'+gr+';grid-column:1"><div class="ftime">'+m.t+'</div><div class="barbox">'+sq+'<div class="btext">'+teams(m)+' <span class="loc">@ '+m.loc+'</span></div>'+note+'</div></div>';
}
const _now=new Date();
const today=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0')+'-'+String(_now.getDate()).padStart(2,'0');
const nav=document.getElementById('nav'), days=document.getElementById('days');
DATA.days.forEach(d=>{
  const isToday=d.iso===today;
  nav.insertAdjacentHTML('beforeend','<a class="chip'+(isToday?' active':'')+'" href="#'+d.id+'" data-id="'+d.id+'">'+d.chip+'</a>');
  const byTime={};
  d.acts.forEach(a=>{ (byTime[a.m]=byTime[a.m]||{m:a.m,acts:[],ms:[]}).acts.push(a); });
  d.matches.filter(x=>!x.p).forEach(mt=>{ (byTime[mt.m]=byTime[mt.m]||{m:mt.m,acts:[],ms:[]}).ms.push(mt); });
  const rows=Object.values(byTime).map(r=>({type:'pair',m:r.m,k:0,acts:r.acts,ms:r.ms}));
  d.matches.filter(x=>x.p).forEach(f=>rows.push({type:'feat',m:f.m,k:1,data:f}));
  rows.sort((x,y)=>(x.m-y.m)||(x.k-y.k));
  let html=d.acts.length?"":'<div class="empty" style="grid-row:1;grid-column:1">No fixed plans yet.</div>';
  let gr=0;
  rows.forEach(r=>{
    gr++;
    if(r.type==='feat'){ html+=featRow(r.data,gr); return; }
    if(r.acts.length) html+='<div class="cell-l" data-m="'+r.m+'" style="grid-row:'+gr+';grid-column:1">'+r.acts.map(actInner).join('')+'</div>';
    if(r.ms.length) html+='<div class="cell-r" data-m="'+r.m+'" style="grid-row:'+gr+';grid-column:2">'+r.ms.map(bubble).join('')+'</div>';
  });
  const stripMatches=d.matches.filter(x=>!x.p);
  const stripHtml=stripMatches.length?'<div class="match-strip"><span class="ball" aria-hidden="true">⚽</span>'+stripMatches.map(bubbleCompact).join('')+'</div>':'';
  days.insertAdjacentHTML('beforeend',
    '<section class="day" id="'+d.id+'" data-iso="'+d.iso+'">'+
      '<div class="dayhead"><h2>'+d.dow+' · '+d.date+'</h2>'+
        (d.hl?'<span class="hl">'+d.hl+'</span>':'')+
        (isToday?'<span class="today">Today</span>':'')+
      '</div>'+
      '<div class="daygrid">'+html+'</div>'+stripHtml+
    '</section>');
});

const chips=[...document.querySelectorAll('.chip')];
const secs=[...document.querySelectorAll('section.day')];
let ticking=false;
function spy(){
  if(!secs.length){ticking=false;return;}
  const off=80; let cur=secs[0].id;
  for(const s of secs){ if(s.getBoundingClientRect().top<=off) cur=s.id; }
  chips.forEach(c=>c.classList.toggle('active',c.dataset.id===cur));
  ticking=false;
}
window.addEventListener('scroll',()=>{ if(!ticking){ requestAnimationFrame(spy); ticking=true; } },{passive:true});
spy();

const ballToggle=document.getElementById('soccer');
if(ballToggle){ ballToggle.addEventListener('change',function(){
  if(!ballToggle.checked) return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const layer=document.createElement('div'); layer.className='ballrain';
  let maxT=0;
  for(let i=0;i<26;i++){
    const b=document.createElement('span'); b.textContent='⚽';
    const dur=1.4+Math.random()*1.6, delay=Math.random()*0.6, spin=(Math.random()<0.5?-1:1)*(360+Math.random()*540);
    b.style.left=(Math.random()*100)+'vw';
    b.style.fontSize=(18+Math.random()*22)+'px';
    b.style.setProperty('--spin',spin+'deg');
    b.style.animation='ballfall '+dur+'s linear '+delay+'s forwards';
    layer.appendChild(b); maxT=Math.max(maxT,dur+delay);
  }
  document.body.appendChild(layer);
  setTimeout(function(){ layer.remove(); },(maxT+0.3)*1000);
}); }

const nowMin=_now.getHours()*60+_now.getMinutes();
document.querySelectorAll('section.day').forEach(function(sec){
  const iso=sec.getAttribute('data-iso');
  if(iso<today){
    sec.classList.add('past');
    const c=document.querySelector('.chip[data-id="'+sec.id+'"]'); if(c) c.classList.add('past');
  } else if(iso===today){
    sec.querySelectorAll('[data-m]').forEach(function(el){ if(parseFloat(el.getAttribute('data-m'))+120<nowMin) el.classList.add('past'); });
  }
});
const _secs=[].slice.call(document.querySelectorAll('section.day'));
const _ts=_secs.find(function(s){ return s.getAttribute('data-iso')===today; });
function gotoToday(){
  if(location.hash || !_ts || _ts===_secs[0]) return;
  const y=_ts.getBoundingClientRect().top+window.scrollY-54;
  const pv=document.documentElement.style.scrollBehavior;
  document.documentElement.style.scrollBehavior='auto';
  window.scrollTo(0,y);
  document.documentElement.style.scrollBehavior=pv;
  spy();
}
if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(gotoToday); } else { window.addEventListener('load',gotoToday); }
</script>
</body>
</html>
