<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --sand-bg:#FBF6EC; --card:#FFFFFF; --ink:#2B2A28; --ink-soft:#6F6A60;
  --line:#EAE1CF; --red:#C2554E; --red-deep:#8E342E; --red-bg:#F6E2DC; --red-line:#E7C3BB;
  --blue:#356093; --blue-deep:#1E4A72; --blue-bg:#E6EFF7; --blue-line:#C3D7E8;
  --gold:#E9A53E; --sky:#DCEBF5;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--sand-bg);color:var(--ink);line-height:1.5;
  font-family:'Klee One',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
a{color:var(--blue)}
.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--sky) 0%,#EFE7D6 70%,var(--sand-bg) 100%);
  padding:30px 16px 54px;text-align:center;border-bottom:1px solid var(--line)}
.hero-in{position:relative;z-index:2;max-width:900px;margin:0 auto}
.kicker{font-family:'Caveat',cursive;font-size:21px;color:var(--red-deep);font-weight:600;margin-bottom:0}
.hero h1{margin:0;font-family:'Caveat',cursive;font-size:66px;color:var(--blue-deep);font-weight:700;line-height:.9}
.hero .sub{font-family:'Caveat',cursive;font-size:30px;color:var(--red);font-weight:700;margin-top:0}
.hero .dates{font-size:15px;color:var(--ink-soft);margin-top:8px}
.hero .tz{font-size:12px;color:var(--ink-soft);margin-top:2px}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:22px;height:12px;border-radius:4px;border:1px solid var(--blue-line);background:var(--blue-bg);display:inline-block}
.sw.bar{width:30px}
.sun{position:absolute;top:18px;right:26px;z-index:1;opacity:.9}
.waves{position:absolute;left:0;right:0;bottom:-1px;width:100%;height:34px;display:block;z-index:1}
nav.nav{position:sticky;top:0;z-index:20;background:rgba(251,246,236,.94);backdrop-filter:blur(7px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:900px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);
  color:var(--ink-soft);text-decoration:none;white-space:nowrap;background:var(--card)}
.chip.active{background:var(--red-bg);color:var(--red-deep);border-color:var(--red-line);font-weight:600}
.wrap{max-width:900px;margin:0 auto;padding:6px 16px 96px}
section.day{scroll-margin-top:62px;padding:24px 0 8px;border-top:1px solid var(--line)}
section.day:first-of-type{border-top:none}
.dayhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 14px}
.dayhead h2{font-family:'Caveat',cursive;font-size:31px;margin:0;font-weight:700;color:var(--ink);line-height:1.05;
  background:linear-gradient(transparent 62%, rgba(233,165,62,.45) 62%);padding:0 5px}
.dayhead .hl{font-size:13px;color:var(--red-deep);font-weight:600}
.dayhead .today{font-size:11px;background:var(--red);color:#fff;border-radius:999px;padding:2px 9px;font-weight:600}
.daygrid{display:grid;grid-template-columns:1fr 300px;column-gap:22px;row-gap:9px;position:relative;align-items:start}
.daygrid::before{content:"";position:absolute;top:2px;bottom:2px;right:311px;width:0;border-left:2px dashed #D9CDB3}
.cell-l{display:flex;flex-direction:column;gap:9px}
.cell-r{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.item{display:grid;grid-template-columns:88px 1fr;gap:12px}
.itime{font-size:13px;font-weight:600;color:var(--ink-soft);white-space:nowrap}
.title{font-size:15px;color:var(--ink)}
.note{font-size:13px;color:var(--ink-soft)}
.mpill{display:inline-flex;background:var(--blue-bg);border:1px solid var(--blue-line);border-radius:14px 10px 15px 9px;
  padding:6px 12px;font-size:13px;color:var(--blue-deep);line-height:1.35}
.mt{font-weight:400;margin-right:7px;white-space:nowrap}
.v{color:var(--blue);padding:0 3px;font-size:12px}
.featrow{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:start}
.ftime{font-size:13px;font-weight:600;color:var(--blue-deep);white-space:nowrap}
.barbox{background:var(--blue-bg);border:1px solid var(--blue-line);border-radius:13px 10px 15px 9px;padding:6px 12px;margin-left:-13px}
.btext{font-size:14px;color:var(--blue-deep);line-height:1.35}
.btext .loc{color:var(--blue)}
.bnote{font-size:12px;color:var(--ink-soft);margin-top:3px}
.empty{font-size:14px;color:var(--ink-soft);font-style:italic}
.allweek{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);
  padding:9px 16px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.aw-label{font-family:'Caveat',cursive;font-size:18px;color:var(--red-deep);font-weight:700}
.aw-items{font-size:14px;color:var(--ink)}
@media (max-width:760px){
  .hero h1{font-size:52px}
  .daygrid{display:block}
  .daygrid::before{display:none}
  .daygrid>*{grid-row:auto!important;grid-column:auto!important;margin-bottom:9px}
  .cell-r{align-items:flex-end}
}
</style>
</head>
<body>
<header class="hero">
  <svg class="sun" width="74" height="74" viewBox="0 0 74 74" aria-hidden="true">
    <circle cx="37" cy="37" r="15" fill="#F1B44C"/>
    <g stroke="#E9A53E" stroke-width="3" stroke-linecap="round">
      <line x1="37" y1="6" x2="37" y2="16"/><line x1="37" y1="58" x2="37" y2="68"/>
      <line x1="6" y1="37" x2="16" y2="37"/><line x1="58" y1="37" x2="68" y2="37"/>
      <line x1="15" y1="15" x2="22" y2="22"/><line x1="52" y1="52" x2="59" y2="59"/>
      <line x1="59" y1="15" x2="52" y2="22"/><line x1="22" y1="52" x2="15" y2="59"/>
    </g>
  </svg>
  <div class="hero-in">
    <div class="kicker">__KICKER__</div>
    <h1>__H1__</h1>
    <div class="sub">__SUB__</div>
    <div class="dates">__DATES__</div>
    <div class="tz">__TZ__</div>
    <div class="legend">
      <span><span class="sw"></span> World Cup match</span>
      <span><span class="sw bar"></span> Match we’re gathering to watch (see “@”)</span>
    </div>
  </div>
  <svg class="waves" viewBox="0 0 1200 34" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,18 C150,34 300,2 450,16 C600,30 750,4 900,16 C1050,28 1150,12 1200,18 L1200,34 L0,34 Z" fill="#FBF6EC"/>
  </svg>
</header>

<nav class="nav"><div class="nav-inner" id="nav"></div></nav>
<main class="wrap" id="days"></main>
<div class="allweek"><span class="aw-label">Anytime all week</span><span class="aw-items">__ALLWEEK__</span></div>

<script>
const DATA=__DATA__;

function teams(m){
  const a=(m.A[0]?m.A[0]+" ":"")+m.A[1];
  const b=(m.B[0]?m.B[0]+" ":"")+m.B[1];
  return a+' <span class="v">v</span> '+b+(m.g?" ?":"");
}
function actInner(a){
  return '<div class="item"><div class="itime">'+a.t+'</div><div><span class="title">'+a.x+'</span>'+(a.n?(' <span class="note">— '+a.n+'</span>'):"")+'</div></div>';
}
function bubble(m){
  const body=m.ro?('Round of 16 · '+m.ro):teams(m);
  return '<span class="mpill"><span class="mt">'+m.t+'</span>'+body+'</span>';
}
function featRow(m,gr){
  const note=(m.n||m.h)?('<div class="bnote">'+(m.n||"")+((m.n&&m.h)?" · ":"")+(m.h?('<a href="'+m.h+'" target="_blank" rel="noopener">register</a>'):"")+'</div>'):"";
  return '<div class="featrow" style="grid-row:'+gr+';grid-column:1"><div class="ftime">'+m.t+'</div><div class="barbox"><div class="btext">'+teams(m)+' <span class="loc">@ '+m.loc+'</span></div>'+note+'</div></div>';
}
const today=new Date().toISOString().slice(0,10);
const nav=document.getElementById('nav'), days=document.getElementById('days');
DATA.days.forEach(d=>{
  const isToday=d.iso===today;
  nav.insertAdjacentHTML('beforeend','<a class="chip'+(isToday?' active':'')+'" href="#'+d.id+'" data-id="'+d.id+'">'+d.chip+'</a>');
  const byTime={};
  d.acts.forEach(a=>{ (byTime[a.m]=byTime[a.m]||{m:a.m,acts:[],ms:[]}).acts.push(a); });
  d.matches.filter(x=>!x.p).forEach(mt=>{ (byTime[mt.m]=byTime[mt.m]||{m:mt.m,acts:[],ms:[]}).ms.push(mt); });
  const rows=Object.values(byTime).map(r=>({type:'pair',m:r.m,k:0,acts:r.acts,ms:r.ms}));
  d.matches.filter(x=>x.p).forEach(f=>rows.push({type:'feat',m:f.m,k:1,data:f}));
  rows.sort((x,y)=>(x.m-y.m)||(x.k-y.k));
  let html=d.acts.length?"":'<div class="empty" style="grid-row:1;grid-column:1">No fixed plans yet.</div>';
  let gr=0;
  rows.forEach(r=>{
    gr++;
    if(r.type==='feat'){ html+=featRow(r.data,gr); return; }
    if(r.acts.length) html+='<div class="cell-l" style="grid-row:'+gr+';grid-column:1">'+r.acts.map(actInner).join('')+'</div>';
    if(r.ms.length) html+='<div class="cell-r" style="grid-row:'+gr+';grid-column:2">'+r.ms.map(bubble).join('')+'</div>';
  });
  days.insertAdjacentHTML('beforeend',
    '<section class="day" id="'+d.id+'">'+
      '<div class="dayhead"><h2>'+d.dow+' · '+d.date+'</h2>'+
        (d.hl?'<span class="hl">'+d.hl+'</span>':'')+
        (isToday?'<span class="today">Today</span>':'')+
      '</div>'+
      '<div class="daygrid">'+html+'</div>'+
    '</section>');
});

const chips=[...document.querySelectorAll('.chip')];
const secs=[...document.querySelectorAll('section.day')];
let ticking=false;
function spy(){
  if(!secs.length){ticking=false;return;}
  const off=80; let cur=secs[0].id;
  for(const s of secs){ if(s.getBoundingClientRect().top<=off) cur=s.id; }
  chips.forEach(c=>c.classList.toggle('active',c.dataset.id===cur));
  ticking=false;
}
window.addEventListener('scroll',()=>{ if(!ticking){ requestAnimationFrame(spy); ticking=true; } },{passive:true});
spy();
</script>
</body>
</html>
